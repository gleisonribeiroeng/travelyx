@if (mobileOpen()) {
  <div class="backdrop" (click)="closeMobile()"></div>
}

<aside class="sidebar" [class.mobile-open]="mobileOpen()">
  <div class="sidebar-header">
    <img src="assets/Tra-removebg-preview.png" alt="Travelyx" class="brand-logo">
  </div>

  <nav class="nav-groups">
    @for (group of navGroups(); track group.label) {
      <div class="nav-group">
        @if (group.label) {
          <span class="group-label">{{ group.label }}</span>
        }
        @for (item of group.items; track item.route) {
          <a
            class="nav-item"
            [routerLink]="item.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.route === '/viagens' || item.route.endsWith('/home') }"
            (click)="closeMobile()"
          >
            <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
            <span class="nav-label">{{ item.label }}</span>
          </a>
        }
      </div>
    }
  </nav>

  <div class="sidebar-footer">
    <button class="add-action" (click)="openNewTrip()">
      <mat-icon>add_circle_outline</mat-icon>
      <span>Nova Viagem</span>
    </button>
    <button class="logout-btn" (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Sair</span>
    </button>
  </div>
</aside>
