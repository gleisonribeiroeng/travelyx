<div class="calendar-page">
  <!-- ═══ Thin header: title + sync button ═══ -->
  <div class="calendar-header">
    <h1>{{ 'itinerary.title' | translate }}</h1>
    <button mat-stroked-button class="calendar-sync-btn" (click)="syncToCalendar()" [disabled]="syncing()">
      @if (syncing()) {
        <mat-spinner diameter="16"></mat-spinner>
      } @else {
        <mat-icon>event</mat-icon>
      }
      {{ 'timeline.googleCalendar' | translate }}
    </button>
  </div>

  <!-- ═══ FullCalendar — the whole page ═══ -->
  @if (tripState.hasItems()) {
    <div class="calendar-wrapper">
      <full-calendar [options]="calendarOptions()" />
    </div>
  } @else {
    <div class="empty-state">
      <mat-icon>calendar_month</mat-icon>
      <h3>{{ 'itinerary.emptyTitle' | translate }}</h3>
      <p>{{ 'itinerary.emptyDesc' | translate }}</p>
    </div>
  }
</div>
