<div class="wizard-shell">
  <!-- Compact progress bar -->
  <div class="wizard-progress">
    @for (step of steps(); track step.key; let i = $index) {
      <div class="progress-step"
           [class.active]="isStepActive(i)"
           [class.complete]="isStepComplete(step.key)"
           [class.skipped]="isStepSkipped(step.key)"
           (click)="goToStep(i)">
        <div class="step-dot">
          @if (isStepComplete(step.key)) {
            <mat-icon class="dot-icon">check</mat-icon>
          } @else {
            <span class="step-number">{{ i + 1 }}</span>
          }
        </div>
        <span class="step-label">{{ step.label }}</span>
      </div>
      @if (i < steps().length - 1) {
        <div class="step-connector"
             [class.complete]="isStepComplete(step.key)">
        </div>
      }
    }
  </div>

  <!-- Step content -->
  <div class="wizard-content">
    <router-outlet></router-outlet>
  </div>

  <!-- Navigation -->
  <div class="wizard-nav">
    @if (!isFirstStep()) {
      <button mat-stroked-button class="nav-back-btn" (click)="prevStep()">
        <mat-icon>arrow_back</mat-icon>
        {{ 'wizard.back' | translate }}
      </button>
    }

    <div class="nav-spacer"></div>

    @if (!isReviewStep()) {
      <button class="skip-link" (click)="skipStep()">
        {{ 'wizard.skipStep' | translate }}
      </button>
    }

    @if (!isLastStep()) {
      <button mat-flat-button color="primary" class="nav-continue-btn" (click)="nextStep()">
        {{ 'wizard.continue' | translate }}
        <mat-icon iconPositionEnd>arrow_forward</mat-icon>
      </button>
    }
  </div>
</div>
