<app-toast-container />

@if (isLandingPage()) {
  <main class="public-content">
    <router-outlet></router-outlet>
  </main>
} @else if (tripState.isLoading()) {
  <div class="loading-overlay">
    <div class="loading-spinner"></div>
    <p>Carregando sua viagem...</p>
  </div>
} @else {
  <div class="dashboard-shell">
    <app-sidebar></app-sidebar>
    <app-top-bar (hamburgerClick)="onHamburgerClick()"></app-top-bar>
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
    <app-support-chat />
  </div>
}

<!-- Plane wipe transition overlay -->
@if (transition.active()) {
  <div class="plane-overlay">
    <div class="plane-dark" [style.clip-path]="overlayClip()"></div>
    <div class="plane-icon" [style.left.%]="planeX()" [style.bottom.%]="planeY()">
      <img src="assets/aviao.png" alt="" class="plane-img">
    </div>
  </div>
}
